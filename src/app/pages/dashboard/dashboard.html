<div class="dashboard-container">
  <header class="dashboard-header">
    <h2><i class="fa-solid fa-gauge-high"></i> 文章管理後台</h2>
    <a routerLink="/dashboard/editor" class="btn-primary">
      <i class="fa-solid fa-plus"></i> 新增文章
    </a>
  </header>

  <div class="table-card">
    @if (isLoading()) {
      <div class="loading-state">
        <p><i class="fa-solid fa-spinner fa-spin"></i> 載入資料中...</p>
      </div>
    } @else {
      <table class="admin-table">
        <thead>
          <tr>
            <th width="5%">ID</th>
            <th width="15%">分類</th>
            <th width="40%">標題</th>
            <th width="20%">建立時間</th>
            <th width="20%">操作</th>
          </tr>
        </thead>
        <tbody>
          @for (post of posts(); track post.id) {
            <tr>
              <td>{{ post.id }}</td>
              <td><span class="category-badge">{{ post.category }}</span></td>
              <td>
                <a [routerLink]="['/post', post.id]" class="post-link" target="_blank">
                  {{ post.title }} <i class="fa-solid fa-arrow-up-right-from-square text-sm"></i>
                </a>
              </td>
              <td>{{ post.created_at | date:'yyyy-MM-dd HH:mm' }}</td>
              <td class="actions">
                <a [routerLink]="['/dashboard/editor', post.id]" class="btn-icon edit">
                  <i class="fa-solid fa-pen-to-square"></i> 編輯
                </a>
                <button (click)="deletePost(post.id, post.title)" class="btn-icon delete">
                  <i class="fa-solid fa-trash-can"></i> 刪除
                </button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="5" class="empty-state">目前還沒有任何文章。</td>
            </tr>
          }
        </tbody>
      </table>
    }
  </div>
</div>
