@if (post) {
  <article class="post-detail-card">
    <nav class="post-nav">
      <a routerLink="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> 返回首頁</a>
    </nav>

    <header class="post-header">
      <span class="category-badge">{{ post.category }}</span>
      <h1 class="post-title">{{ post.title }}</h1>
      
      <div class="post-meta">
        <span class="meta-item"><i class="fa-solid fa-user-astronaut"></i> {{ post.author }}</span>
        <span class="meta-item"><i class="fa-regular fa-calendar-days"></i> {{ post.date | date:'yyyy-MM-dd' }}</span>
      </div>
    </header>

    <hr class="divider">

    <div class="post-content" [innerHTML]="post.content"></div>
    
    <footer class="post-footer">
      <div class="tags">
        <i class="fa-solid fa-tags"></i>
        @for (item of post.tags; track $index) {
          <span class="tag">{{ item }}</span>
        }
      </div>
    </footer>
  </article>
} @else {
  <div class="loading-state">
    <p><i class="fa-solid fa-spinner fa-spin"></i> 文章載入中...</p>
  </div>
}
